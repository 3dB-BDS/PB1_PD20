name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Get repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
        
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v tests/
        
  build:
    name: docker build
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Get repository
        uses: actions/checkout@v6
        
      - name: Build Docker image (SHA + SemVer tags vienā build)
        run: |
          docker build \
            -t myapp:${{ github.sha }} \
            -t myapp:v1.0.0 \
            .
          echo "Built: myapp:${{ github.sha }}"
          echo "Built: myapp:v1.0.0"